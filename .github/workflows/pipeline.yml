name: DevOps Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build com Maven
        run: mvn clean package -DskipTests

      - name: Build Docker
        run: docker build -t eficiencia-app .

      - name: Rodar container
        run: docker run -d -p 8080:8080 eficiencia-app

      - name: Teste da API
        run: |
          sleep 10
          curl --fail http://localhost:8080/alertas-consumo